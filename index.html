<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى فلانة ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d81b60;
            --soft-pink: #ffc1cc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('cit7.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            color: var(--primary-color);
            touch-action: none; /* لمنع التمرير الافتراضي */
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 238, 242, 0.6); 
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            border: 2px solid var(--soft-pink);
            z-index: 10;
            position: relative;
        }

        /* تكبير صورة هيلو كيتي */
        .image-box {
            width: 250px; 
            height: 250px; 
            border-radius: 30px;
            margin: 0 auto 25px auto;
            background-size: cover;
            background-position: center;
            border: 6px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: background-image 0.6s ease-in-out;
        }

        .cit1 { background-image: url('cit1.jpg'); }
        .cit2 { background-image: url('cit2.jpg'); }
        .cit3 { background-image: url('cit3.jpg'); }
        .cit4 { background-image: url('cit4.jpg'); }
        .cit5 { background-image: url('cit5.jpg'); }
        .cit6 { background-image: url('cit6.jpg'); }

        #display-text {
            font-size: 1.4rem;
            font-weight: 700;
            height: 3.5rem;
            margin-bottom: 25px;
        }

        .btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            z-index: 20;
            transition: 0.3s;
        }

        /* تنسيق القلوب المتطايرة الكثيرة */
        .heart-particle {
            position: absolute;
            pointer-events: none;
            z-index: 9999;
            font-size: 24px;
            user-select: none;
            animation: moveHeart 2s ease-out forwards;
        }

        @keyframes moveHeart {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                /* القيم المتغيرة سيتم تحديدها بواسطة JS */
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--tr));
                opacity: 0;
            }
        }

        .heart-btn { font-size: 85px; cursor: pointer; background: none; border: none; animation: heartBeat 0.8s infinite; }
        @keyframes heartBeat { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }
        .hidden { display: none; }
        .final-screen { position: fixed; inset: 0; display: flex; justify-content: center; align-items: center; z-index: 100; background-image: url('cit7.jpg'); background-size: cover; background-position: center; }
        .final-screen::before { content: ""; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(5px); }
        .player-card { position: relative; background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 35px; width: 300px; text-align: center; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="image-frame" class="image-box cit1"></div>
    <div id="display-text"></div>
    <div id="btn-container">
        <button class="btn" id="action-btn" onclick="nextStep()">أبدأ ❤️</button>
    </div>
</div>

<div id="final-screen" class="final-screen hidden">
    <div class="player-card">
        <div class="album-art cit6" style="width:200px; height:200px; margin:auto; border-radius:20px; background-size:cover; border:4px solid white;"></div>
        <h2>أغنيتنا المفضلة 🎵</h2>
        <p>💞 اعشقج واحبج يا فلانة🩷</p>
        <button class="btn" onclick="location.reload()">إعادة 🔄</button>
    </div>
</div>

<script>
    // وظيفة إنشاء "انفجار" من القلوب
    function createHeartBurst(x, y) {
        const heartCount = 10; // عدد القلوب في كل لمسة
        for (let i = 0; i < heartCount; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'heart-particle';
            
            // تحديد مكان البدء
            heart.style.left = x + 'px';
            heart.style.top = y + 'px';
            
            // حساب مسار عشوائي لكل قلب
            const tx = (Math.random() - 0.5) * 300; // تحرك عشوائي لليمين أو اليسار
            const ty = (Math.random() - 0.5) * 300 - 150; // تحرك للأعلى بشكل أكبر
            const tr = Math.random() * 360; // دوران عشوائي
            
            heart.style.setProperty('--tx', `${tx}px`);
            heart.style.setProperty('--ty', `${ty}px`);
            heart.style.setProperty('--tr', `${tr}deg`);
            
            // ألوان متنوعة
            const colors = ['#ff69b4', '#ff1493', '#d81b60', '#ffb6c1', '#ff0000'];
            heart.style.color = colors[Math.floor(Math.random() * colors.length)];
            
            document.body.appendChild(heart);
            
            setTimeout(() => heart.remove(), 2000);
        }
    }

    // تفعيل التأثير عند اللمس أو الضغط
    document.addEventListener('mousedown', (e) => createHeartBurst(e.clientX, e.clientY));
    document.addEventListener('touchstart', (e) => {
        createHeartBurst(e.touches[0].clientX, e.touches[0].clientY);
    });

    let currentStep = 0;
    const content = [
        { text: "هلو فلانة", class: "cit1", btn: "هلوو" },
        { text: "فلانة عندي سؤال الجججج", class: "cit2", btn: "شنو هو؟" },
        { text: "بس مستحية اسألج اياه  🤭", class: "cit3", btn: "اسألي" },
        { text: "تحبين فلان لو لااا؟", class: "cit4", btn: "ها؟ 🤭" },
        { text: "شنو هااا 😒 تحبين فلان لو لااا؟", class: "cit5", btn: "مدري" },
        { text: "اذا تحبين فلان دوسي على القلب 🤭", class: "cit6", btn: "🩷" }
    ];

    function nextStep() {
        if (currentStep >= content.length) {
            document.getElementById('main-container').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
            return;
        }
        const data = content[currentStep];
        const btn = document.getElementById('action-btn');
        btn.style.opacity = '0';
        
        setTimeout(() => {
            document.getElementById('image-frame').className = "image-box " + data.class;
            document.getElementById('display-text').innerText = data.text;
            btn.innerText = data.btn;
            btn.style.opacity = '1';
            if(data.btn === "🩷") btn.className = "heart-btn";
        }, 300);
        currentStep++;
    }
</script>

</body>
</html>
