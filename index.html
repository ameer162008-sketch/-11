<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى فلانة ❤️</title>
    <style>
        :root {
            --primary-color: #d81b60;
            --soft-pink: #ffc1cc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef2; /* لون احتياطي في حال لم تظهر الخلفية */
            background-image: url('cit7.jpg'); 
            background-size: cover;
            background-position: center;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* الحاوية الرئيسية */
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 30px;
            border-radius: 30px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 10;
            border: 2px solid var(--soft-pink);
        }

        /* تكبير صورة هيلو كيتي */
        .image-box {
            width: 250px; 
            height: 250px; 
            border-radius: 20px;
            margin: 0 auto 20px;
            background-size: cover;
            background-position: center;
            border: 5px solid white;
            transition: 0.5s ease-in-out;
        }

        /* تعريف الصور */
        .cit1 { background-image: url('cit1.jpg'); }
        .cit2 { background-image: url('cit2.jpg'); }
        .cit3 { background-image: url('cit3.jpg'); }
        .cit4 { background-image: url('cit4.jpg'); }
        .cit5 { background-image: url('cit5.jpg'); }
        .cit6 { background-image: url('cit6.jpg'); }

        #display-text {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            min-height: 3rem;
        }

        .btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* نظام القلوب المتطايرة */
        .heart-p {
            position: absolute;
            pointer-events: none;
            font-size: 25px;
            z-index: 100;
            animation: fly 1.5s ease-out forwards;
        }

        @keyframes fly {
            0% { transform: translate(0,0) scale(1); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
        }

        .hidden { display: none; }
        .heart-btn { font-size: 60px; background: none; border: none; cursor: pointer; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

<div class="container" id="main-card">
    <div id="img-frame" class="image-box cit1"></div>
    <div id="display-text">انتظري قليلاً... ❤️</div>
    <button class="btn" id="main-btn" onclick="next()">أبدأ ❤️</button>
</div>

<script>
    let step = 0;
    const data = [
        { t: "هلو فلانة", i: "cit1", b: "هلوو" },
        { t: "فلانة عندي سؤال الجججج", i: "cit2", b: "شنو هو؟" },
        { t: "بس مستحية اسألج اياه 🤭", i: "cit3", b: "اسألي" },
        { t: "تحبين فلان لو لااا؟", i: "cit4", b: "ها؟ 🤭" },
        { t: "شنو هااا 😒 تحبين فلان لو لااا؟", i: "cit5", b: "مدري" },
        { t: "اذا تحبين فلان دوسي على القلب 🤭", i: "cit6", b: "🩷" }
    ];

    function next() {
        if (step >= data.length) {
            document.getElementById('display-text').innerHTML = "💞 اعشقج واحبج يا فلانة 🩷";
            document.getElementById('main-btn').classList.add('hidden');
            return;
        }
        
        const current = data[step];
        document.getElementById('img-frame').className = "image-box " + current.i;
        document.getElementById('display-text').innerText = current.t;
        const btn = document.getElementById('main-btn');
        btn.innerText = current.b;
        
        if(current.b === "🩷") {
            btn.className = "heart-btn";
            btn.innerHTML = "❤️";
        }
        step++;
    }

    // وظيفة القلوب الكثيرة عند اللمس
    function burst(e) {
        const x = e.clientX || e.touches[0].clientX;
        const y = e.clientY || e.touches[0].clientY;
        
        for (let i = 0; i < 12; i++) {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'heart-p';
            h.style.left = x + 'px';
            h.style.top = y + 'px';
            h.style.setProperty('--x', (Math.random() - 0.5) * 300 + 'px');
            h.style.setProperty('--y', (Math.random() - 0.5) * 300 - 100 + 'px');
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 1500);
        }
    }

    document.addEventListener('mousedown', burst);
    document.addEventListener('touchstart', burst);
    
    // تشغيل أول خطوة تلقائياً
    window.onload = next;
</script>
</body>
</html>
