here<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى فلانة ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d81b60;
            --soft-pink: #ffc1cc;
            --transition-speed: 0.4s;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-image: url('cit7.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            color: var(--primary-color);
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 238, 242, 0.6); 
            z-index: -1;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            padding: 40px 20px;
            border-radius: 40px;
            width: 85%;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            border: 2px solid var(--soft-pink);
            z-index: 1;
        }

        .image-box {
            width: 180px;
            height: 180px;
            border-radius: 30px;
            margin: 0 auto 25px auto;
            background-size: cover;
            background-position: center;
            border: 6px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            transition: background-image 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* كلاسات الصور */
        .cit1 { background-image: url('cit1.jpg'); }
        .cit2 { background-image: url('cit2.jpg'); }
        .cit3 { background-image: url('cit3.jpg'); }
        .cit4 { background-image: url('cit4.jpg'); }
        .cit5 { background-image: url('cit5.jpg'); }
        .cit6 { background-image: url('cit6.jpg'); }

        #display-text {
            font-size: 1.4rem;
            font-weight: 700;
            height: 3.5rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn {
            background: #ff69b4;
            color: white;
            border: none;
            padding: 14px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn:hover {
            transform: scale(1.08);
            background: #ff1493;
            box-shadow: 0 8px 20px rgba(255, 20, 147, 0.4);
        }

        .btn.hidden-btn { opacity: 0; pointer-events: none; transform: scale(0.8); }

        .heart-btn {
            font-size: 85px;
            cursor: pointer;
            background: none;
            border: none;
            display: inline-block;
            animation: heartBeat 0.8s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        @keyframes heartBeat { 0% { transform: scale(1); } 100% { transform: scale(1.2); } }

        /* تنسيق مشغل الأغاني النهائي */
        .final-screen {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background-image: url('cit7.jpg'); 
            background-size: cover;
            background-position: center;
        }

        .final-screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(5px);
        }

        .player-card {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 35px;
            width: 300px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .album-art {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            border-radius: 25px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 4px solid white;
        }

        .song-info h2 { color: var(--primary-color); margin: 10px 0 5px; font-size: 1.5rem; }
        .song-info p { color: #888; margin: 0; font-size: 0.9rem; }

        .audio-controls { margin-top: 20px; }
        .play-pause-btn {
            background: #ff69b4;
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .play-pause-btn:hover { background: #ff1493; transform: scale(1.1); }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 10px;
            margin: 20px 0 10px;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-bar { width: 0%; height: 100%; background: #ff69b4; }

        .love-note { font-size: 1.1rem; color: var(--primary-color); margin-top: 20px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container" id="main-container">
    <div id="image-frame" class="image-box cit1"></div>
    <div id="display-text"></div>
    <div id="btn-container">
        <button class="btn" id="action-btn" onclick="nextStep()">أبدأ ❤️</button>
    </div>
</div>

<div id="final-screen" class="final-screen hidden">
    <div class="player-card">
        <div class="album-art cit6"></div>
        <div class="song-info">
            <h2>أغنيتنا المفضلة 🎵</h2>
            <p> فلانة & فلان ❤️</p>
        </div>
        <div class="audio-controls">
            <audio id="player">
                <source src="song.mp3" type="audio/mpeg">
            </audio>
            <div class="custom-player">
                <button class="play-pause-btn" id="playBtn" onclick="togglePlay()">▶️</button>
                <div class="progress-container" onclick="seek(event)">
                    <div class="progress-bar" id="progress"></div>
                </div>
            </div>
        </div>
        <p class="love-note"> 💞 اعشقج واحبج يا فلانة🩷</p>
    </div>
</div>

<script>
    let currentStep = 0;
    const textElement = document.getElementById('display-text');
    const imageFrame = document.getElementById('image-frame');
    const btn = document.getElementById('action-btn');
    const player = document.getElementById('player');
    const progressBar = document.getElementById('progress');
    const playBtn = document.getElementById('playBtn');

    const content = [
        { text: "هلو فلانة", class: "cit1", btn: "هلوو" },
        { text: "فلانة عندي سؤال الجججج", class: "cit2", btn: "شنو هو؟" },
        { text: "بس مستحية اسألج اياه  🤭", class: "cit3", btn: "اسألي" },
        { text: "تحبين فلان لو لااا؟", class: "cit4", btn: "ها؟ 🤭" },
        { text: "شنو هااا 😒 تحبين فلان لو لااا؟", class: "cit5", btn: "مدري" },
        { text: "اذا تحبين فلان دوسي على القلب 🤭", class: "cit6", btn: "🩷" }
    ];

    function typeEffect(text, callback) {
        let i = 0;
        textElement.innerHTML = "";
        function type() {
            if (i < text.length) {
                textElement.innerHTML += text.charAt(i);
                i++;
                setTimeout(type, 65);
            } else if (callback) callback();
        }
        type();
    }

    function nextStep() {
        if (currentStep >= content.length) {
            document.getElementById('main-container').style.transform = "scale(0.8)";
            setTimeout(() => {
                document.getElementById('main-container').classList.add('hidden');
                document.getElementById('final-screen').classList.remove('hidden');
                player.play();
                playBtn.innerHTML = "⏸️";
            }, 300);
            return;
        }

        const data = content[currentStep];
        btn.classList.add('hidden-btn');
        setTimeout(() => {
            imageFrame.className = "image-box " + data.class;
            typeEffect(data.text, () => {
                btn.classList.remove('hidden-btn');
                btn.innerText = data.btn;
                if(data.btn === "❤️") {
                    btn.className = "heart-btn";
                    btn.innerHTML = "❤️";
                }
            });
        }, 300);
        currentStep++;
    }

    function togglePlay() {
        if (player.paused) {
            player.play();
            playBtn.innerHTML = "⏸️";
        } else {
            player.pause();
            playBtn.innerHTML = "▶️";
        }
    }

    player.ontimeupdate = function() {
        const percentage = (player.currentTime / player.duration) * 100;
        progressBar.style.width = percentage + "%";
    };

    function seek(event) {
        const container = event.currentTarget;
        const clickX = event.offsetX;
        const width = container.offsetWidth;
        player.currentTime = (clickX / width) * player.duration;
    }

    window.addEventListener('load', () => { setTimeout(nextStep, 500); });
</script>

</body>
</html>
